name: quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential \
            curl \
            file \
            libacl1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.0
          components: clippy, rustfmt

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        run: pnpm typecheck

      - name: Test frontend
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Check Rust formatting
        run: |
          cargo fmt --manifest-path apps/tauri/src-tauri/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-core/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-platform-acl/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-platform-fs/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-private-fs/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-recovery/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-mutations/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-snapshots/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-app-service/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/desktop-auth/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/drive-sync-spike/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-sync-engine/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-drive/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-transfer/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/tauri-plugin-google-auth/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/tauri-plugin-private-root/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/tauri-plugin-vault-saf/Cargo.toml --all -- --check

      - name: Lint Rust
        run: |
          cargo clippy --manifest-path apps/tauri/src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path crates/myvault-core/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path crates/myvault-platform-acl/Cargo.toml --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path crates/myvault-platform-fs/Cargo.toml --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path crates/myvault-private-fs/Cargo.toml --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path crates/myvault-recovery/Cargo.toml --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path crates/myvault-mutations/Cargo.toml --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path crates/myvault-snapshots/Cargo.toml --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path crates/myvault-app-service/Cargo.toml --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path crates/desktop-auth/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path crates/drive-sync-spike/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path crates/myvault-sync-engine/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path crates/myvault-drive/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path crates/myvault-transfer/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path crates/tauri-plugin-google-auth/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path crates/tauri-plugin-private-root/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path crates/tauri-plugin-vault-saf/Cargo.toml --all-targets -- -D warnings

      - name: Test Rust
        run: |
          cargo test --manifest-path apps/tauri/src-tauri/Cargo.toml
          cargo test --manifest-path crates/myvault-core/Cargo.toml
          cargo test --manifest-path crates/myvault-platform-acl/Cargo.toml
          cargo test --manifest-path crates/myvault-platform-fs/Cargo.toml
          cargo test --manifest-path crates/myvault-private-fs/Cargo.toml
          cargo test --manifest-path crates/myvault-recovery/Cargo.toml
          cargo test --manifest-path crates/myvault-mutations/Cargo.toml
          cargo test --manifest-path crates/myvault-snapshots/Cargo.toml
          cargo test --manifest-path crates/myvault-app-service/Cargo.toml
          cargo test --manifest-path crates/desktop-auth/Cargo.toml
          cargo test --manifest-path crates/drive-sync-spike/Cargo.toml
          cargo test --manifest-path crates/myvault-sync-engine/Cargo.toml
          cargo test --manifest-path crates/myvault-drive/Cargo.toml
          cargo test --manifest-path crates/myvault-transfer/Cargo.toml
          cargo test --manifest-path crates/tauri-plugin-google-auth/Cargo.toml
          cargo test --manifest-path crates/tauri-plugin-private-root/Cargo.toml
          cargo test --manifest-path crates/tauri-plugin-vault-saf/Cargo.toml

      - name: Audit R2 static trust boundaries
        shell: bash
        run: |
          set +e
          git grep -n -E '\.(patch|delete)[[:space:]]*\(|Method::(PATCH|DELETE)' -- crates/myvault-drive/src
          forbidden_method_status=$?
          set -e
          if [[ $forbidden_method_status -eq 0 ]]; then
            echo "::error::The R2 Drive adapter contains a forbidden PATCH or DELETE construction path."
            exit 1
          elif [[ $forbidden_method_status -ne 1 ]]; then
            echo "::error::The forbidden-method audit could not run."
            exit "$forbidden_method_status"
          fi
          mutation_paths="$(git grep -l -E '\.(post|put)[[:space:]]*\(|Method::(POST|PUT)' -- crates/myvault-drive/src || true)"
          if [[ "$mutation_paths" != "crates/myvault-drive/src/transfer.rs" ]]; then
            echo "::error::R2 POST/PUT construction escaped the single guarded transfer module."
            printf '%s\n' "$mutation_paths"
            exit 1
          fi
          set +e
          git grep -n -E '(addParents|removeParents|/permissions|trashed[[:space:]]*[:=][[:space:]]*true)' -- crates/myvault-drive/src
          forbidden_endpoint_status=$?
          set -e
          if [[ $forbidden_endpoint_status -eq 0 ]]; then
            echo "::error::The R2 Drive adapter contains a forbidden mutation endpoint or field."
            exit 1
          elif [[ $forbidden_endpoint_status -ne 1 ]]; then
            echo "::error::The forbidden-endpoint audit could not run."
            exit "$forbidden_endpoint_status"
          fi
          set +e
          git grep -n -I -E '(access[_-]?token|refresh[_-]?token|authorization[_-]?code|code[_-]?verifier)' -- ':(glob)apps/tauri/src/**/*.ts' ':(glob)apps/tauri/src/**/*.tsx' ':(exclude,glob)apps/tauri/src/**/*.test.ts' ':(exclude,glob)apps/tauri/src/**/*.test.tsx'
          ui_audit_status=$?
          set -e
          if [[ $ui_audit_status -eq 0 ]]; then
            echo "::error::A token-shaped field crossed into frontend source."
            exit 1
          elif [[ $ui_audit_status -ne 1 ]]; then
            echo "::error::The frontend token-field audit could not run."
            exit "$ui_audit_status"
          fi

  android-compile:
    name: android-compile
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Install Java 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android command-line tools
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

      - name: Install Rust Android target
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.0
          targets: aarch64-linux-android

      - name: Install Android SDK and NDK
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.13846066"

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile Android Google auth bridge and APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.13846066
        run: pnpm --dir apps/tauri tauri android build --debug --apk --target aarch64

      - name: Verify 16 KB APK alignment
        run: |
          "$ANDROID_HOME/build-tools/36.0.0/zipalign" -c -P 16 -v 4 \
            apps/tauri/src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk
