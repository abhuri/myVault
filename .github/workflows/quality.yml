name: quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential \
            curl \
            file \
            libacl1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.0
          components: clippy, rustfmt

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        run: pnpm typecheck

      - name: Test frontend
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Check Rust formatting
        run: |
          cargo fmt --manifest-path apps/tauri/src-tauri/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-core/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-platform-acl/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-platform-fs/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-private-fs/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-recovery/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-mutations/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-snapshots/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/myvault-app-service/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/desktop-auth/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/drive-sync-spike/Cargo.toml --all -- --check
          cargo fmt --manifest-path crates/tauri-plugin-google-auth/Cargo.toml --all -- --check

      - name: Lint Rust
        run: |
          cargo clippy --manifest-path apps/tauri/src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path crates/myvault-core/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path crates/myvault-platform-acl/Cargo.toml --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path crates/myvault-platform-fs/Cargo.toml --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path crates/myvault-private-fs/Cargo.toml --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path crates/myvault-recovery/Cargo.toml --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path crates/myvault-mutations/Cargo.toml --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path crates/myvault-snapshots/Cargo.toml --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path crates/myvault-app-service/Cargo.toml --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path crates/desktop-auth/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path crates/drive-sync-spike/Cargo.toml --all-targets -- -D warnings

      - name: Test Rust
        run: |
          cargo test --manifest-path apps/tauri/src-tauri/Cargo.toml
          cargo test --manifest-path crates/myvault-core/Cargo.toml
          cargo test --manifest-path crates/myvault-platform-acl/Cargo.toml
          cargo test --manifest-path crates/myvault-platform-fs/Cargo.toml
          cargo test --manifest-path crates/myvault-private-fs/Cargo.toml
          cargo test --manifest-path crates/myvault-recovery/Cargo.toml
          cargo test --manifest-path crates/myvault-mutations/Cargo.toml
          cargo test --manifest-path crates/myvault-snapshots/Cargo.toml
          cargo test --manifest-path crates/myvault-app-service/Cargo.toml
          cargo test --manifest-path crates/desktop-auth/Cargo.toml
          cargo test --manifest-path crates/drive-sync-spike/Cargo.toml

  android-compile:
    name: android-compile
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Install Java 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android command-line tools
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

      - name: Install Rust Android target
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.96.0
          targets: aarch64-linux-android

      - name: Install Android SDK and NDK
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.13846066"

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile Android GIS bridge and APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.13846066
        run: pnpm --dir apps/tauri tauri android build --debug --apk --target aarch64

      - name: Verify 16 KB APK alignment
        run: |
          "$ANDROID_HOME/build-tools/36.0.0/zipalign" -c -P 16 -v 4 \
            apps/tauri/src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk
